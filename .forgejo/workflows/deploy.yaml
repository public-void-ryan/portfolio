name: Deploy Portfolio
on:
  push:
    branches:
      - main

env:
  GOTIFY_PORT: "8080"

jobs:
  build-and-deploy:
    runs-on: native
    steps:
      - name: Verify Node Runtime
        run: |
          node --version
          npm --version
          echo "$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: npm --prefix "$GITHUB_WORKSPACE" ci

      - name: Test
        run: npm --prefix "$GITHUB_WORKSPACE" test

      - name: Build
        run: npm --prefix "$GITHUB_WORKSPACE" run build

      - name: Deploy
        run: /run/current-system/sw/bin/rsync -a --delete "$GITHUB_WORKSPACE/dist/" /var/www/portfolio/

      - name: Notify Success
        if: success()
        run: |
          /run/current-system/sw/bin/curl -s -X POST "http://127.0.0.1:${GOTIFY_PORT}/message?token=${{ secrets.GOTIFY_TOKEN }}" \
               -F "title=✅ Portfolio Deployed" \
               -F "message=Portfolio deployed successfully for commit ${{ github.sha }}." \
               -F "priority=5"

      - name: Notify Failure
        if: failure()
        run: |
          /run/current-system/sw/bin/curl -s -X POST "http://127.0.0.1:${GOTIFY_PORT}/message?token=${{ secrets.GOTIFY_TOKEN }}" \
               -F "title=❌ Portfolio Deploy Failed" \
               -F "message=Deploy failed for commit ${{ github.sha }}." \
               -F "priority=8"
