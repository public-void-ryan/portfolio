name: Deploy Portfolio
on:
  push:
    branches:
      - main

env:
  GOTIFY_PORT: "8080"
  WORK_DIR: /var/lib/forgejo/portfolio

jobs:
  build-and-deploy:
    runs-on: native
    steps:
      - name: Checkout Code
        run: |
          if [ -d "$WORK_DIR/.git" ]; then
            git -C "$WORK_DIR" fetch origin main
            git -C "$WORK_DIR" reset --hard origin/main
          else
            git clone ssh://forgejo@git.0ku.xyz/ryan/portfolio.git "$WORK_DIR"
          fi

      - name: Install dependencies
        run: npm --prefix "$WORK_DIR" install
        env:
          npm_config_cache: /tmp/npm-cache

      - name: Build
        run: npm --prefix "$WORK_DIR" run build

      - name: Deploy
        run: rsync -a --delete "$WORK_DIR/dist/" /var/www/portfolio/

      - name: Notify Success
        if: success()
        run: |
          curl -s -X POST "http://127.0.0.1:${GOTIFY_PORT}/message?token=${{ secrets.GOTIFY_TOKEN }}" \
               -F "title=✅ Portfolio Deployed" \
               -F "message=Portfolio deployed successfully for commit ${{ github.sha }}." \
               -F "priority=5"

      - name: Notify Failure
        if: failure()
        run: |
          curl -s -X POST "http://127.0.0.1:${GOTIFY_PORT}/message?token=${{ secrets.GOTIFY_TOKEN }}" \
               -F "title=❌ Portfolio Deploy Failed" \
               -F "message=Deploy failed for commit ${{ github.sha }}." \
               -F "priority=8"
