name: Deploy Portfolio
on:
  push:
    branches:
      - main

env:
  GOTIFY_PORT: "8080"
  WORK_DIR: /tmp/portfolio-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build-and-deploy:
    runs-on: native
    steps:
      - name: Checkout Code
        run: |
          /run/current-system/sw/bin/rm -rf "$WORK_DIR"
          /run/current-system/sw/bin/timeout 90 \
            git -c http.extraHeader="Authorization: token ${{ github.token }}" \
            clone --depth 1 "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" "$WORK_DIR"

      - name: Verify Node Runtime
        run: |
          node --version
          npm --version
          echo "$WORK_DIR"
          ls -la "$WORK_DIR"

      - name: Install dependencies
        run: npm --prefix "$WORK_DIR" install

      - name: Test
        run: npm --prefix "$WORK_DIR" test

      - name: Build
        run: npm --prefix "$WORK_DIR" run build

      - name: Deploy
        run: /run/wrappers/bin/sudo -n /run/current-system/sw/bin/rsync -rlptD --delete "$WORK_DIR/dist/" /var/www/portfolio/

      - name: Notify Success
        if: success()
        run: |
          /run/current-system/sw/bin/curl -s -X POST "http://127.0.0.1:${GOTIFY_PORT}/message?token=${{ secrets.GOTIFY_TOKEN }}" \
               -F "title=✅ Portfolio Deployed" \
               -F "message=Portfolio deployed successfully for commit ${{ github.sha }}." \
               -F "priority=5"

      - name: Notify Failure
        if: failure()
        run: |
          /run/current-system/sw/bin/curl -s -X POST "http://127.0.0.1:${GOTIFY_PORT}/message?token=${{ secrets.GOTIFY_TOKEN }}" \
               -F "title=❌ Portfolio Deploy Failed" \
               -F "message=Deploy failed for commit ${{ github.sha }}." \
               -F "priority=8"
